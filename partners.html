<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partners & Investors | CiviWatch Guardian AI</title>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        :root { --bg-color: #0d1117; --text-color: #c9d1d9; --primary: #1f6feb; --primary-hover: #388bfd; --secondary-bg: #161b22; --border-color: #30363d; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--bg-color); color: var(--text-color); overflow-x: hidden; display: flex; flex-direction: column; min-height: 100vh; }
        a { text-decoration: none; color: inherit; }

        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; pointer-events: none;}
        .bg-logo-watermark { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.05; width: 50vw; max-width: 500px; z-index: -1; pointer-events: none; }

        /* Navbar */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: rgba(13,17,23,0.85); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-color); position: fixed; width: 100%; top: 0; z-index: 1000; flex-wrap: wrap; box-sizing: border-box;}
        .logo { font-size: 1.5rem; font-weight: bold; color: #fff; }
        .logo span { color: var(--primary); }
        
        .nav-links { display: flex; list-style: none; gap: 20px; align-items: center; margin:0; padding:0;}
        .nav-links li { position: relative; }
        .nav-links a { color: #8b949e; transition: 0.3s; padding: 10px 0; display: block; }
        .nav-links a:hover { color: #fff; }
        
        .dropdown-content { position: absolute; top: 100%; left: 0; background: var(--secondary-bg); border: 1px solid var(--border-color); border-radius: 6px; min-width: 180px; display: none; flex-direction: column; box-shadow: 0 8px 16px rgba(0,0,0,0.5); }
        [dir="rtl"] .dropdown-content { left: auto; right: 0; }
        .dropdown:hover .dropdown-content { display: flex; }
        .dropdown-content a { padding: 10px 15px; border-bottom: 1px solid var(--border-color); }
        .dropdown-content a:hover { background: #30363d; color: #fff; }

        .nav-actions { display: flex; gap: 15px; align-items: center; }
        .lang-toggle { display: flex; align-items: center; gap: 5px; color: #8b949e; font-weight: bold; cursor: pointer; }
        .lang-toggle svg { width: 20px; height: 20px; fill: currentColor; }
        .btn-secondary { border: 1px solid #8b949e; padding: 8px 15px; border-radius: 6px; transition: 0.3s; text-align: center; }
        .btn-secondary:hover { border-color: #fff; color: #fff; }
        .btn-primary { background: var(--primary); padding: 8px 15px; border-radius: 6px; color: #fff; font-weight: bold; transition: 0.3s; text-align: center; border: none; cursor: pointer;}
        .btn-primary:hover { background: var(--primary-hover); }

        .mobile-toggle { display: none; font-size: 1.8rem; cursor: pointer; color: #fff; }
        
        @media (max-width: 992px) {
            .mobile-toggle { display: block; order: 2; }
            .logo { order: 1; }
            .nav-links, .nav-actions { display: none; width: 100%; flex-direction: column; text-align: center; order: 3; padding-top: 15px; }
            nav.active .nav-links, nav.active .nav-actions { display: flex; gap: 15px; }
            .dropdown-content { position: static; display: none; background: transparent; box-shadow: none; }
            .dropdown:hover .dropdown-content { display: flex; flex-direction: column; align-items: center;}
        }

        /* Hero */
        .hero { padding: 120px 5% 50px; display: flex; align-items: center; }
        .hero-inner { display: flex; gap: 40px; align-items: center; max-width: 1200px; margin: 0 auto; width: 100%; flex-wrap: wrap;}
        .hero-text { flex: 1; min-width: 300px;}
        .hero-video { flex: 1; min-width: 300px; aspect-ratio: 16/9; border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color); background: #000; }
        .hero-video iframe { width: 100%; height: 100%; border: none; }
        
        .iso-badge { display: inline-block; padding: 6px 15px; background: rgba(31,111,235,0.1); border: 1px solid var(--primary); color: #58a6ff; border-radius: 50px; margin-bottom: 20px; font-weight: bold; font-size: 0.9rem;}

        .hero-text h1 { font-size: 3rem; line-height: 1.2; margin-bottom: 20px; color: #fff; }
        .hero-text h1 span:last-child { color: var(--primary); }
        .hero-text p { font-size: 1.1rem; color: #8b949e; margin-bottom: 30px; line-height: 1.6; }

        /* Sections */
        .section { padding: 50px 5%; max-width: 1200px; margin: 0 auto; flex: 1; width: 100%; }
        .section-title { font-size: 2rem; color: #fff; margin-bottom: 10px; text-align: center; }
